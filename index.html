<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTech 1st Year Dashboard</title>
    <meta name="description" content="Interactive dashboard for BTech 1st year students containing academic calendar and syllabus.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class='bx bxs-building-house'></i>
                <span>Civil BTech</span>
            </div>
            <nav class="menu">
                <a href="#" class="menu-item active" data-tab="calendar" id="nav-calendar">
                    <i class='bx bx-calendar'></i>
                    <span>Calendar</span>
                </a>
                <a href="#" class="menu-item" data-tab="syllabus" id="nav-syllabus">
                    <i class='bx bx-book-open'></i>
                    <span>Syllabus</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>Civil Engineering</p>
                <p>First Year</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header" style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h1 id="page-title">Academic Calendar</h1>
                    <p id="page-subtitle">Interactive schedule for 2026</p>
                </div>
                <div class="header-counters" id="header-counters" style="display: flex; gap: 1rem;">
                    <div class="counter-box">
                        <span class="counter-num" id="days-to-exam">--</span>
                        <span class="counter-label">Days left till end sem exams</span>
                    </div>
                    <div class="counter-box">
                        <span class="counter-num" id="days-to-sem-end">--</span>
                        <span class="counter-label">Days left for sem over</span>
                    </div>
                </div>
            </header>

            <!-- Calendar View -->
            <section id="calendar-view" class="view-section active">
                <div class="calendar-layout">
                    <!-- Calendar Grid -->
                    <div class="calendar-container">
                        <div class="calendar-header year-header">
                            <button id="prev-year" aria-label="Previous Year"><i class='bx bx-chevron-left'></i></button>
                            <h2 id="current-year-text">2026</h2>
                            <button id="next-year" aria-label="Next Year"><i class='bx bx-chevron-right'></i></button>
                        </div>
                        <div class="calendar-year-grid" id="calendar-year-grid">
                            <!-- 12 months generated by JS -->
                        </div>
                    </div>

                    <!-- Event Details Panel -->
                    <div class="event-details-panel">
                        <h3>Event Details</h3>
                        <div class="legend">
                            <div class="legend-item"><span class="dot exam"></span> Exams</div>
                            <div class="legend-item"><span class="dot holiday"></span> Holidays</div>
                            <div class="legend-item"><span class="dot academic"></span> Academic</div>
                        </div>
                        <div id="selected-date-info" class="selected-date-info">
                            <p class="instruction-text">Select a date on the calendar to view associated events.</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Syllabus View -->
            <section id="syllabus-view" class="view-section">
                <div class="syllabus-tabs" style="overflow-x: auto; white-space: nowrap; padding-bottom: 0.5rem; margin-bottom: 2rem;">
                    <button class="syllabus-tab active" data-sem="sem1">Sem 1</button>
                    <button class="syllabus-tab" data-sem="sem2">Sem 2</button>
                    <button class="syllabus-tab" data-sem="sem3">Sem 3</button>
                    <button class="syllabus-tab" data-sem="sem4">Sem 4</button>
                    <button class="syllabus-tab" data-sem="sem5">Sem 5</button>
                    <button class="syllabus-tab" data-sem="sem6">Sem 6</button>
                    <button class="syllabus-tab" data-sem="sem7">Sem 7</button>
                    <button class="syllabus-tab" data-sem="sem8">Sem 8</button>
                </div>
                <div id="syllabus-container">
                    <!-- Syllabus Table generated by JS -->
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
